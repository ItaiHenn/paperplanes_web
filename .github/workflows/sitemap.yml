name: Update Sitemap

on:
  push:
    branches:
      - claude/vigilant-fermi-n5rrqs
    paths:
      - 'js/data.js'

jobs:
  update-sitemap:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/vigilant-fermi-n5rrqs

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate sitemap
        run: node generate-sitemap.js

      - name: Commit updated sitemap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml episodes-meta.json
          git diff --cached --quiet || git commit -m "Auto-update sitemap [skip ci]"
          git push
