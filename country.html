<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פרקים לפי מדינה · מטוסי נייר</title>
<meta name="description" content="כל הפרקים של פודקאסט מטוסי נייר לפי מדינה — טיולים, הרפתקאות וסיפורים מהיעד.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Secular+One&family=Rubik:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<style>
  .c-hero{position:relative;overflow:hidden;color:#fff;background:linear-gradient(155deg,#157A8B,#0A3F49);padding-block:clamp(40px,6vw,72px);}
  .c-hero .wrap{position:relative;z-index:2;}
  .crumb{display:inline-flex;align-items:center;gap:6px;color:#bfe0e6;font-size:14.5px;margin-bottom:18px;}
  .crumb a:hover{color:#fff;}
  .crumb svg{width:16px;height:16px;}
  .c-flag{font-size:64px;line-height:1;filter:drop-shadow(0 6px 14px rgba(0,0,0,.25));}
  .c-hero h1{font-size:clamp(38px,6vw,66px);margin-top:10px;}
  .c-meta{display:flex;gap:22px;margin-top:18px;color:#d6eef2;font-size:16px;flex-wrap:wrap;}
  .c-meta span{display:inline-flex;align-items:center;gap:7px;}
  .c-meta svg{width:18px;height:18px;color:var(--mint-300);}
  .c-plane{position:absolute;color:rgba(167,230,216,.25);width:120px;top:14%;left:6%;transform:rotate(-10deg);}
  section{padding-block:clamp(40px,5vw,70px);}
  .empty{text-align:center;padding:70px 20px;background:#fff;border:1px dashed var(--line);border-radius:var(--r-lg);}
  .empty svg{width:54px;height:54px;color:var(--mint);margin-bottom:14px;}
  .empty h3{font-size:26px;color:var(--teal-900);}
  .empty p{color:var(--muted);margin-top:8px;}
  .ep-date{font-size:13px;color:var(--muted);}
</style>
</head>
<body data-page="where">
<div id="site-header"></div>

<section class="c-hero">
  <span class="c-plane" id="cPlane"></span>
  <div class="clouds" data-clouds></div>
  <div class="wrap">
    <div class="crumb"><a href="index.html" data-i18n="crumb_home"></a> <span id="cArrow"></span> <a href="index.html#globe-section" data-i18n="crumb_where"></a> <span id="cArrow2"></span> <span id="cName"></span></div>
    <div class="c-flag" id="cFlag"></div>
    <h1 id="cTitle"></h1>
    <div class="c-meta" id="cMetaRow"></div>
  </div>
</section>

<section>
  <div class="wrap">
    <div id="cContent"></div>
  </div>
</section>

<div id="site-footer"></div>

<script src="js/data.js"></script>
<script src="js/icons.js"></script>
<script src="js/i18n.js"></script>
<script src="js/chrome.js"></script>
<script>
(function () {
  var I = PPIcons, PP = window.PP, T = window.T;
  var nm = function(c){return T.lang==="he"?c.he:c.en;};
  var loc = T.lang==="he" ? "he-IL" : "en-US";
  function q(n){return new URLSearchParams(location.search).get(n);}
  function fmtDate(d){ try{return new Date(d).toLocaleDateString(loc,{day:"numeric",month:"long",year:"numeric"});}catch(e){return d;} }

  document.getElementById("cArrow").innerHTML = I.arrow;
  document.getElementById("cArrow2").innerHTML = I.arrow;
  document.getElementById("cPlane").innerHTML = I.planeFill;

  var code = q("c");
  var c = PP.countryByCode(code);
  if (!c) {
    document.getElementById("cTitle").textContent = t("country_nf_title");
    document.getElementById("cContent").innerHTML = '<div class="empty">'+I.globe+'<h3>'+t("country_nf_title")+'</h3><p>'+t("country_nf_p")+'</p><div style="margin-top:18px"><a class="btn btn--primary" href="index.html#globe-section">'+t("to_globe")+'</a></div></div>';
    return;
  }

  document.title = nm(c) + " · " + (T.lang==="he"?"מטוסי נייר":"Paper Planes");
  document.getElementById("cFlag").textContent = c.flag;
  document.getElementById("cName").textContent = nm(c);
  document.getElementById("cTitle").textContent = nm(c);

  var eps = PP.episodesByCountry(code);
  document.getElementById("cMetaRow").innerHTML =
    '<span>'+I.pin+' '+c.en+'</span>'+
    '<span>'+I.play+' '+eps.length+' '+t("eps_word")+'</span>';

  var box = document.getElementById("cContent");
  if (!eps.length) {
    var emptyP = T.lang==="he" ? ("עדיין לא העלינו פרקים מ"+c.he+", אבל זה ממש מעבר לפינה. בינתיים — עקבו אחרינו.") : ("We haven't published episodes from "+c.en+" yet, but they're just around the corner. Meanwhile — follow us.");
    box.innerHTML = '<div class="empty">'+I.planeFill+'<h3>'+t("country_empty_title")+'</h3><p>'+emptyP+'</p><div style="margin-top:20px"><a class="btn btn--primary" href="'+PP.social.spotify+'" target="_blank" rel="noopener">'+t("country_empty_btn")+'</a></div></div>';
    return;
  }
  box.innerHTML = '<div class="grid-cards">'+ eps.map(function(e){
    var cover = e.cover || "assets/logo.jpg";
    var ttl = (T.lang==="en" && e.title_en) ? e.title_en : e.title;
    return '<a class="card" href="episode.html?id='+e.id+'">'+
      '<div class="card__media"><img src="'+cover+'" alt="'+ttl+'">'+
        '<span class="card__tag">'+c.flag+' '+nm(c)+'</span></div>'+
      '<div class="card__body">'+
        '<span class="ep-date">'+fmtDate(e.date)+' · '+(e.duration||"")+'</span>'+
        '<h3 class="card__title">'+ttl+'</h3>'+
        '<p class="card__desc">'+(e.description||"")+'</p>'+
        '<span class="card__foot"><span class="chip">'+I.play+' '+t("listen_chip")+'</span></span>'+
      '</div></a>';
  }).join("") + '</div>';
})();
</script>
</body>
</html>
