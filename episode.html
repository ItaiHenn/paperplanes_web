<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פרק · מטוסי נייר</title>
<meta name="description" content="האזינו לפרק של מטוסי נייר, קראו את התיאור והתמלול המלא.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Secular+One&family=Rubik:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<style>
  .e-hero{background:linear-gradient(155deg,#157A8B,#0A3F49);color:#fff;padding-block:clamp(34px,5vw,56px) 0;}
  .crumb{display:inline-flex;align-items:center;gap:6px;color:#bfe0e6;font-size:14.5px;margin-bottom:20px;flex-wrap:wrap;}
  .crumb a:hover{color:#fff;} .crumb svg{width:16px;height:16px;}
  .e-top{display:grid;grid-template-columns:240px 1fr;gap:30px;align-items:center;}
  .e-cover{width:240px;height:240px;border-radius:22px;object-fit:cover;box-shadow:var(--shadow-lg);border:5px solid rgba(255,255,255,.9);}
  .e-top h1{font-size:clamp(28px,3.8vw,46px);margin-top:8px;}
  .e-top h1 small{display:block;font-family:var(--body);font-weight:500;font-size:16px;color:#bfe0e6;margin-top:8px;letter-spacing:.02em;}
  .e-meta{display:flex;gap:18px;color:#d6eef2;font-size:15px;margin-top:14px;flex-wrap:wrap;}
  .e-meta span{display:inline-flex;align-items:center;gap:6px;} .e-meta svg{width:17px;height:17px;color:var(--mint-300);}
  .e-tagchip{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.14);padding:7px 14px;border-radius:var(--r-pill);font-weight:600;font-size:14px;color:#fff;}
  .player-wrap{margin-top:30px;}
  .player-wrap iframe{width:100%;border:0;border-radius:14px;}
  @media(max-width:680px){.e-top{grid-template-columns:1fr;justify-items:center;text-align:center;}.e-cover{width:200px;height:200px;}}

  .e-body{display:grid;grid-template-columns:1fr 300px;gap:46px;padding-block:clamp(36px,5vw,60px);align-items:start;}
  @media(max-width:880px){.e-body{grid-template-columns:1fr;}}
  .prose h2{font-size:26px;color:var(--teal-900);margin:0 0 14px;}
  .prose p{font-size:17px;color:#33585f;margin-bottom:16px;line-height:1.85;}
  .transcript{margin-top:40px;border-top:1px solid var(--line);padding-top:34px;}
  .tabs{display:inline-flex;background:var(--sky);border-radius:var(--r-pill);padding:5px;gap:4px;margin-bottom:18px;}
  .tabs button{padding:8px 18px;border-radius:var(--r-pill);font-weight:600;font-size:14.5px;color:var(--teal-900);transition:.16s;}
  .tabs button.active{background:#fff;color:var(--teal);box-shadow:var(--shadow-sm);}
  .tab-pane{display:none;} .tab-pane.active{display:block;}
  .tab-pane[dir="ltr"]{text-align:left;}
  .tab-pane[dir="ltr"] p{direction:ltr;}
  .seo-pill{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;color:var(--muted);background:var(--sky-50);border:1px solid var(--line);padding:5px 12px;border-radius:var(--r-pill);margin-bottom:14px;}
  .seo-pill svg{width:15px;height:15px;color:var(--mint);}

  .aside-card{background:#fff;border:1px solid var(--line);border-radius:var(--r-lg);padding:22px;box-shadow:var(--shadow-sm);position:sticky;top:94px;}
  .aside-card h4{font-size:18px;color:var(--teal-900);margin-bottom:14px;}
  .aside-listen{display:flex;flex-direction:column;gap:10px;}
  .aside-listen a{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:12px;border:1px solid var(--line);font-weight:600;font-size:14.5px;color:var(--teal-900);transition:.16s;}
  .aside-listen a:hover{border-color:var(--teal);transform:translateX(-3px);}
  .aside-listen .ic{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;color:#fff;flex-shrink:0;}
  .aside-listen svg{width:19px;height:19px;}
</style>
</head>
<body data-page="where">
<div id="site-header"></div>
<article>
<section class="e-hero">
  <div class="clouds" data-clouds></div>
  <div class="wrap">
    <div class="crumb" id="eCrumb"></div>
    <div class="e-top">
      <img class="e-cover" id="eCover" alt="">
      <div>
        <a class="e-tagchip" id="eCountry" href="#"></a>
        <h1 id="eTitle"></h1>
        <div class="e-meta" id="eMeta"></div>
      </div>
    </div>
    <div class="player-wrap" id="ePlayer"></div>
  </div>
</section>

<section>
  <div class="wrap e-body">
    <div class="prose">
      <h2 data-i18n="ep_about"></h2>
      <div id="eDesc"></div>

      <div class="transcript">
        <span class="seo-pill" id="eSeoPill"></span>
        <h2 data-i18n="ep_transcript"></h2>
        <div class="tabs" id="eTabs">
          <button data-t="he" class="active" data-i18n="ep_tab_he"></button>
          <button data-t="en">English</button>
        </div>
        <div class="tab-pane active" id="paneHe" dir="rtl"></div>
        <div class="tab-pane" id="paneEn" dir="ltr"></div>
      </div>
    </div>

    <aside>
      <div class="aside-card">
        <h4 data-i18n="ep_aside"></h4>
        <div class="aside-listen" id="eAside"></div>
      </div>
    </aside>
  </div>
</section>
</article>

<div id="site-footer"></div>
<script type="application/ld+json" id="epLd"></script>

<script src="js/data.js"></script>
<script src="js/icons.js"></script>
<script src="js/i18n.js"></script>
<script src="js/chrome.js"></script>
<script>
(function () {
  var I = PPIcons, PP = window.PP, T = window.T;
  var nm = function(c){return T.lang==="he"?c.he:c.en;};
  var loc = T.lang==="he" ? "he-IL" : "en-US";
  function q(n){return new URLSearchParams(location.search).get(n);}
  function fmtDate(d){ try{return new Date(d).toLocaleDateString(loc,{day:"numeric",month:"long",year:"numeric"});}catch(e){return d;} }
  function paras(t){ return (t||"").split(/\n+/).map(function(s){return '<p>'+s.trim()+'</p>';}).join(""); }

  var e = PP.episodeById(q("id"));
  if (!e) { document.querySelector("article").innerHTML = '<div class="wrap" style="padding:80px 0;text-align:center"><h1 class="h-sec">הפרק לא נמצא</h1><p class="lead" style="margin-inline:auto">אולי הקישור השתנה. חזרו לעמוד הבית.</p><div style="margin-top:20px"><a class="btn btn--primary" href="index.html">לעמוד הבית</a></div></div>'; return; }
  var c = PP.countryByCode(e.country) || {he:"",flag:"",code:""};

  document.title = e.title + " · מטוסי נייר";
  document.getElementById("eCrumb").innerHTML =
    '<a href="index.html">בית</a> '+I.arrow+' <a href="country.html?c='+c.code+'">'+c.flag+' '+c.he+'</a> '+I.arrow+' <span>'+e.title+'</span>';
  document.getElementById("eCover").src = e.cover || "assets/logo.jpg";
  document.getElementById("eCover").alt = e.title;
  var cc = document.getElementById("eCountry");
  cc.href = "country.html?c="+c.code; cc.innerHTML = c.flag+' '+c.he;
  document.getElementById("eTitle").innerHTML = e.title + (e.title_en?'<small>'+e.title_en+'</small>':'');
  document.getElementById("eMeta").innerHTML =
    '<span>'+I.clock+' '+(e.duration||"")+'</span><span>'+I.play+' '+fmtDate(e.date)+'</span>';

  // spotify player
  var src = e.spotify || "";
  if (src.indexOf("/embed/")===-1) src = src.replace("open.spotify.com/","open.spotify.com/embed/");
  document.getElementById("ePlayer").innerHTML = src ?
    '<iframe src="'+src+'" height="232" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>' :
    '<div class="notice">'+I.spotify+' '+t("player_soon")+'</div>';

  document.getElementById("eDesc").innerHTML = paras(e.description);
  document.getElementById("eSeoPill").innerHTML = I.check + " " + t("ep_seo");
  document.getElementById("paneHe").innerHTML = paras(e.transcript_he || e.description);
  document.getElementById("paneEn").innerHTML = paras(e.transcript_en || t("transcript_en_soon"));

  // tabs
  document.getElementById("eTabs").addEventListener("click", function(ev){
    var b = ev.target.closest("button"); if(!b) return;
    [].forEach.call(this.children,function(x){x.classList.remove("active");});
    b.classList.add("active");
    var t = b.getAttribute("data-t");
    document.getElementById("paneHe").classList.toggle("active", t==="he");
    document.getElementById("paneEn").classList.toggle("active", t==="en");
  });

  // aside listen
  var AL = [
    {k:"spotify",t:"Spotify",cls:"bg-spotify",ic:I.spotify}
  ];
  document.getElementById("eAside").innerHTML = AL.map(function(x){
    return '<a href="'+PP.social[x.k]+'" target="_blank" rel="noopener"><span class="ic '+x.cls+'">'+x.ic+'</span>'+x.t+'</a>';
  }).join("");

  // JSON-LD episode (SEO)
  document.getElementById("epLd").textContent = JSON.stringify({
    "@context":"https://schema.org","@type":"PodcastEpisode",
    "name":e.title,"inLanguage":"he","datePublished":e.date,
    "description":e.description,
    "partOfSeries":{"@type":"PodcastSeries","name":"מטוסי נייר · Paper Planes"},
    "transcript":e.transcript_he || e.transcript_en || ""
  });
})();
</script>
</body>
</html>
