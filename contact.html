<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>צרו קשר · מטוסי נייר</title>
<meta name="description" content="רוצים להציע יעד, לשתף פעולה או סתם לומר שלום? דברו איתנו.">
<link rel="canonical" href="https://paperplanes.co.il/contact.html">
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="apple-touch-icon" href="assets/favicon.png">
<meta property="og:type" content="website">
<meta property="og:url" content="https://paperplanes.co.il/contact.html">
<meta property="og:site_name" content="מטוסי נייר · Paper Planes">
<meta property="og:title" content="צרו קשר · מטוסי נייר">
<meta property="og:description" content="רוצים להציע יעד, לשתף פעולה או סתם לומר שלום? דברו איתנו.">
<meta property="og:image" content="https://paperplanes.co.il/assets/logo.jpg">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://paperplanes.co.il/assets/logo.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Secular+One&family=Rubik:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<style>
  .ct{display:grid;grid-template-columns:1fr 1fr;gap:50px;align-items:start;padding-block:clamp(40px,6vw,76px);}
  @media(max-width:820px){.ct{grid-template-columns:1fr;gap:34px;}}
  .ct h1{font-size:clamp(34px,5vw,56px);color:var(--teal-900);margin-top:10px;}
  .ct .lead{margin-bottom:26px;}
  .contact-card{background:#fff;border:1px solid var(--line);border-radius:var(--r-lg);padding:30px;box-shadow:var(--shadow-md);}
  .ways{display:flex;flex-direction:column;gap:14px;margin-top:6px;}
  .way{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:14px;background:var(--sky-50);border:1px solid var(--line);transition:.16s;}
  .way:hover{transform:translateY(-3px);border-color:var(--teal);}
  .way .ic{width:46px;height:46px;border-radius:12px;color:#fff;display:grid;place-items:center;flex-shrink:0;}
  .way svg{width:23px;height:23px;}
  .way b{font-size:16px;color:var(--teal-900);} .way span{font-size:13.5px;color:var(--muted);}
</style>
</head>
<body data-page="contact">
<div id="site-header"></div>

<section>
  <div class="wrap ct">
    <div>
      <span class="eyebrow" id="ctEyebrow"></span>
      <h1 data-i18n="contact_h1"></h1>
      <p class="lead" data-i18n="contact_lead"></p>
      <div class="ways" id="ways"></div>
    </div>

    <div class="contact-card">
      <h2 style="font-size:24px;color:var(--teal-900);margin-bottom:6px" data-i18n="contact_form_title"></h2>
      <p style="color:var(--muted);margin-bottom:20px" data-i18n="contact_form_sub"></p>
      <form id="cForm">
        <div class="field"><label data-i18n="f_name"></label><input required name="name" data-i18n-ph="f_name_ph"></div>
        <div class="field"><label data-i18n="f_email"></label><input required type="email" name="email" placeholder="you@example.com"></div>
        <div class="field"><label data-i18n="f_topic"></label>
          <select name="topic"><option data-i18n="topic1"></option><option data-i18n="topic2"></option><option data-i18n="topic3"></option><option data-i18n="topic4"></option></select></div>
        <div class="field"><label data-i18n="f_msg"></label><textarea required name="msg" data-i18n-ph="f_msg_ph"></textarea></div>
        <button class="btn btn--primary" type="submit" style="width:100%;justify-content:center" id="cSubmit" data-i18n="f_send"></button>
        <div id="cDone" style="display:none;margin-top:16px" class="notice"></div>
      </form>
    </div>
  </div>
</section>

<div id="site-footer"></div>

<script src="js/data.js"></script>
<script src="js/icons.js"></script>
<script src="js/i18n.js"></script>
<script src="js/chrome.js"></script>
<script>
(function(){
  var I = PPIcons, PP = window.PP, T = window.T;
  document.getElementById("ctEyebrow").innerHTML = I.mail + " " + t("contact_eyebrow");
  var ways = [
    {ic:I.mail,cls:"bg-apple",t:t("way_email_t"),s:PP.social.email,href:"mailto:"+PP.social.email},
    {ic:I.whatsapp,cls:"bg-spotify",t:t("way_whatsapp_t"),s:t("way_whatsapp_s"),href:"https://wa.me/"+PP.social.whatsapp},
{ic:I.instagram,cls:"bg-instagram",t:"Instagram",s:"@paperplanes_podcast",href:PP.social.instagram},
    {ic:I.facebook,cls:"bg-facebook",t:t("t_facebook"),s:t("s_facebook"),href:PP.social.facebook},
    {ic:I.spotify,cls:"bg-spotify",t:"Spotify",s:t("s_spotify_follow"),href:PP.social.spotify}
  ];
  document.getElementById("ways").innerHTML = ways.map(function(w){
    return '<a class="way" href="'+w.href+'" target="_blank" rel="noopener"><span class="ic '+w.cls+'">'+w.ic+'</span><span><b>'+w.t+'</b><br><span>'+w.s+'</span></span></a>';
  }).join("");

  document.getElementById("cForm").addEventListener("submit",function(ev){
    ev.preventDefault();
    var form = this;
    var btn = document.getElementById("cSubmit");
    var done = document.getElementById("cDone");
    btn.disabled = true; btn.textContent = "...שולח";
    fetch("https://formspree.io/f/mdaragne", {
      method: "POST",
      body: new FormData(form),
      headers: { Accept: "application/json" }
    }).then(function(r){ return r.json().then(function(d){ return {ok:r.ok,d:d}; }); })
      .then(function(res){
        if(res.ok){
          form.reset();
          btn.style.display="none";
          done.style.display="flex"; done.innerHTML = I.check + " " + t("contact_done");
        } else {
          throw new Error((res.d.errors||[]).map(function(e){return e.message;}).join(", ")||"שגיאה בשליחה");
        }
      })
      .catch(function(err){
        btn.disabled = false; btn.textContent = t("f_send");
        done.style.display="flex"; done.innerHTML = "⚠️ " + err.message;
      });
  });
})();
</script>
</body>
</html>
